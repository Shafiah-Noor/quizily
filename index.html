<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="login-box">
    <div class="login-card">
      <h1>Quizily</h1>
      <p class="small-text">Login to continue your subject quizzes.</p>
      <input id="username" placeholder="Enter name" />
      <input id="email" placeholder="Enter email" />
      <button id="start-btn" class="primary-btn">Start</button>
      <div id="login-msg" class="small-text"></div>
    </div>
  </div>

  <div id="dashboard-box" class="hidden">
    <div class="dashboard-header">
      <div class="dashboard-top">
        <div>
          <h2>Welcome, <span id="user-name"></span></h2>
          <p id="user-email" class="small-text"></p>
          <p id="user-progress" class="small-text"></p>
        </div>
        <div class="btn-row">
          <button id="logout-btn" class="secondary-btn">Logout</button>
        </div>
      </div>
    </div>

    <div class="subject-grid">
      <button class="subject-card biology" data-subject="biology">
        <div class="subject-name">Biology</div>
        <div id="bio-progress" class="subject-progress">0/10</div>
        <div class="mini-track"><div id="bio-bar" class="mini-bar"></div></div>
      </button>

      <button class="subject-card chemistry" data-subject="chemistry">
        <div class="subject-name">Chemistry</div>
        <div id="chem-progress" class="subject-progress">0/10</div>
        <div class="mini-track"><div id="chem-bar" class="mini-bar"></div></div>
      </button>

      <button class="subject-card maths" data-subject="maths">
        <div class="subject-name">Maths</div>
        <div id="math-progress" class="subject-progress">0/10</div>
        <div class="mini-track"><div id="math-bar" class="mini-bar"></div></div>
      </button>

      <button class="subject-card physics" data-subject="physics">
        <div class="subject-name">Physics</div>
        <div id="phy-progress" class="subject-progress">0/10</div>
        <div class="mini-track"><div id="phy-bar" class="mini-bar"></div></div>
      </button>
    </div>
  </div>

  <div id="levels-box" class="hidden">
    <div class="levels-header">
      <div class="dashboard-top">
        <div>
          <h2 id="levels-title">Levels</h2>
          <p id="levels-subtitle" class="small-text">Choose a level to begin.</p>
        </div>
        <div class="btn-row">
          <button id="back-dashboard-btn" class="secondary-btn">Dashboard</button>
        </div>
      </div>

      <div id="subject-theme" class="theme-banner hidden">
        <span id="theme-icon">✨</span>
        <span id="theme-name"></span>
      </div>
    </div>

    <div id="level-grid"></div>
  </div>

  <div id="quiz-box" class="hidden">
    <div class="quiz-card">
      <div class="quiz-header">
        <div class="dashboard-top">
          <div>
            <div id="counter" class="small-text"></div>
            <h2 id="question"></h2>
          </div>
          <div id="timer" class="small-text"></div>
        </div>
        <div class="progress-track"><div id="progress-bar"></div></div>
      </div>

      <div id="options">
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
        <button class="option"></button>
      </div>

      <div class="btn-row">
        <button id="next" class="primary-btn">Next</button>
        <button id="back" class="secondary-btn">Back</button>
      </div>
    </div>
  </div>

  <div id="result-box" class="hidden">
    <div class="result-card">
      <h2 id="welcome"></h2>
      <p>You completed this level successfully.</p>
      <p>Score: <span id="score"></span></p>
      <p>Stars earned: <span id="earned-stars"></span></p>
      <p id="stars"></p>
      <div class="btn-row" style="justify-content:center;">
        <button id="go-dashboard" class="primary-btn">Go to Dashboard</button>
        <button id="restart-btn" class="secondary-btn" onclick="location.reload()">Restart</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
